<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="f" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="arr" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- F vertical bar -->
  <rect x="112" y="96" width="72" height="320" rx="28" fill="url(#f)"/>
  <!-- F top horizontal -->
  <rect x="112" y="96" width="220" height="72" rx="28" fill="url(#f)"/>
  <!-- F middle horizontal -->
  <rect x="112" y="248" width="160" height="64" rx="28" fill="url(#f)" opacity="0.85"/>
  <!-- Arrow diagonal line -->
  <line x1="295" y1="400" x2="385" y2="270" stroke="url(#arr)" stroke-width="36" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="385,270 310,258 348,328" fill="url(#arr)"/>
</svg>
